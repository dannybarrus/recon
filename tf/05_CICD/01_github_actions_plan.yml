# ─── CI/CD: GITHUB ACTIONS PLAN ──────────────────────────────────────────────
# File: .github/workflows/terraform-plan.yml
#
# Runs terraform plan on every pull request.
# Posts the plan output as a PR comment.
# Uses OIDC (workload identity federation) -- no secrets stored in GitHub.

name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "tf/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write       # required for OIDC
  contents: read
  pull-requests: write  # required to post PR comments

env:
  TF_VERSION: "1.6.0"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC:        "true"   # use OIDC, no ARM_CLIENT_SECRET needed

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}

    defaults:
      run:
        working-directory: tf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=stfstaterecon" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tf/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `## Terraform Plan
            \`\`\`
            ${truncated}
            \`\`\`
            *Plan exit code: ${{ steps.plan.outcome }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on Plan Error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tf/tfplan
          retention-days: 5
