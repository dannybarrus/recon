# ─── CI/CD: GITHUB ACTIONS APPLY ─────────────────────────────────────────────
# File: .github/workflows/terraform-apply.yml
#
# Runs terraform apply on merge to main.
# Uses the saved plan artifact from the plan workflow.
# Requires manual approval for prod via GitHub Environments.

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "tf/**"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION:          "1.6.0"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC:        "true"

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: prod   # requires approval from prod environment reviewers

    defaults:
      run:
        working-directory: tf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=stfstaterecon" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Terraform Apply Failed',
              body: `Apply failed on commit ${context.sha}. Check run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['terraform', 'incident']
            });

---

# ─── CI/CD: DRIFT DETECTION ───────────────────────────────────────────────────
# File: .github/workflows/terraform-drift.yml
#
# Runs terraform plan on a schedule to detect configuration drift.
# Drift occurs when infrastructure is changed outside Terraform
# (manual changes in the portal, CLI, or other tools).
# Opens a GitHub issue when drift is detected.

name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION:          "1.6.0"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC:        "true"

jobs:
  drift:
    name: Detect Drift
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=stfstaterecon" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan (drift check)
        id: drift
        # -detailed-exitcode: exit 0 = no changes, exit 1 = error, exit 2 = changes detected
        run: |
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open Drift Issue
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tf/drift_output.txt', 'utf8');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['terraform-drift'],
              state: 'open'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Terraform Drift Detected - ${new Date().toISOString().split('T')[0]}`,
                body: `Drift detected between Terraform state and actual infrastructure.\n\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``,
                labels: ['terraform-drift', 'infrastructure']
              });
            }

      - name: Fail on Error (not on drift)
        if: steps.drift.outputs.exit_code == '1'
        run: exit 1
